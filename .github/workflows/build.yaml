name: Build Status

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - LICENSE
      - README.md
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]
        node-version: [22.x]
        airflow: ["2", "3", ""]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - uses: actions-ext/python/setup@5f78fa2cadf4dad2a7cded3c72655bcdd3dda735
      with:
        version: ${{ matrix.python-version }}

    - uses: actions-ext/node/setup@3478453a763ed3c8c6eba05a092ab81a265c5492
      with:
        version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: make develop

    - name: Install Airflow 2.x
      run: uv pip install -e .[airflow]
      if: ${{ matrix.airflow == '2' }}

    - name: Install Airflow 3.x
      run: uv pip install -e .[airflow3]
      if: ${{ matrix.airflow == '3' }}

    - name: Lint
      run: make lint
      if: matrix.os == 'ubuntu-latest'

    - name: Checks
      run: make checks
      if: matrix.os == 'ubuntu-latest'

    - name: Build
      run: make build

    - name: Test
      run: make coverage
      if: matrix.os == 'ubuntu-latest'

    - name: Upload test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.node-version }}
        path: '**/junit.xml'
      if: ${{ matrix.airflow == '2' }}

    - name: Publish Unit Test Results
      uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
      with:
        files: '**/junit.xml'
      if: ${{ matrix.airflow == '2' }}

    - name: Upload coverage
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
      if: ${{ matrix.airflow == '2' }}

    - name: Make dist
      run: make dist
      if: ${{ matrix.airflow == '2' }}

    - uses: actions-ext/python/test-wheel@5f78fa2cadf4dad2a7cded3c72655bcdd3dda735
      with:
        module: airflow_balancer
      if: ${{ matrix.airflow == '2' }}

    - uses: actions-ext/python/test-sdist@5f78fa2cadf4dad2a7cded3c72655bcdd3dda735
      with:
        module: airflow_balancer
      if: ${{ matrix.airflow == '2' }}

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dist-${{matrix.os}}
        path: dist
      if: ${{ matrix.airflow == '2' }}
